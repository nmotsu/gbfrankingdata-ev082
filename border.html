<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b0b19;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .header{background:#0f0f23;border-bottom:1px solid #1a1a30;padding:10px 16px}
  .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h1{font-size:1.1rem;color:#60a5fa;white-space:nowrap}
  select{background:#1e1e3f;color:#e2e8f0;border:1px solid #2d2d5e;border-radius:6px;padding:5px 10px;font-size:13px}
  .back-link{color:#93c5fd;text-decoration:none;font-size:13px;padding:4px 10px;background:#1a1a3a;border:1px solid #2d2d5e;border-radius:6px;transition:all 0.2s}
  .back-link:hover{background:#2d2d5e;color:#fff}
  .container{max-width:1200px;margin:0 auto;padding:16px}
  .section{background:#0f0f23;border:1px solid #1a1a30;border-radius:8px;padding:16px;margin-bottom:16px}
  .section-title{font-size:14px;font-weight:bold;color:#94a3b8;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#1a1a30;color:#94a3b8;padding:6px 8px;text-align:right;font-weight:normal;font-size:11px}
  th:first-child{text-align:left}
  td{padding:6px 8px;border-bottom:1px solid #1a1a2e;text-align:right}
  td:first-child{text-align:left;font-weight:600}
  tbody tr:nth-child(even){background:rgba(255,255,255,0.03)}
  .positive{color:#4ade80}
  .pred-col{color:#fbbf24;font-size:12px}
  .chart-wrap{position:relative;width:100%;margin-top:8px}
  canvas{width:100%!important}
  .tier-toggles{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .tier-btn{padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid;transition:all 0.15s;font-weight:600}
  .tier-btn.active{opacity:1}
  .tier-btn.inactive{opacity:0.3}
  .gchart-type-btn{padding:4px 10px;border-radius:5px;font-size:12px;cursor:pointer;background:#1e1e3f;border:1px solid #2d2d5e;color:#94a3b8;transition:all 0.2s}
  .gchart-type-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
  .gchart-type-btn:hover:not(.active){background:#2d2d5e}
  .ctrl-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .ctrl-row label{font-size:12px;color:#94a3b8}
  .cmp-btn{padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;background:#1e1e3f;border:1px solid #2d2d5e;color:#64748b;transition:all 0.15s;white-space:nowrap}
  .cmp-btn.active{background:#2d2d5e;color:#e2e8f0;border-color:#60a5fa}
  .cmp-btn:hover:not(.active){background:#252545;color:#94a3b8}
  .legend-group{margin-bottom:4px}
  .legend-group-title{font-size:10px;color:#64748b;margin-bottom:2px}
  .legend-items{display:flex;flex-wrap:wrap;gap:6px}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#94a3b8;cursor:pointer;user-select:none}
  .legend-item:hover{color:#e2e8f0}
  .legend-item.hidden{opacity:0.3;text-decoration:line-through}
  .legend-swatch{flex-shrink:0}
  .loading{text-align:center;padding:40px;color:#64748b;font-size:14px}
  .collapse-toggle{background:none;border:none;color:#64748b;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px}
  .collapse-toggle:hover{color:#94a3b8;background:#1a1a30}
  .collapse-toggle .arrow{transition:transform 0.2s;display:inline-block}
  .collapse-toggle.collapsed .arrow{transform:rotate(-90deg)}
  .collapsible-content{overflow:hidden;transition:max-height 0.25s ease}
  .quick-btns{display:flex;gap:4px;margin-bottom:4px}
  .quick-btn{padding:2px 7px;border-radius:10px;font-size:10px;cursor:pointer;background:#1e1e3f;border:1px solid #2d2d5e;color:#64748b;transition:all 0.15s}
  .quick-btn:hover{background:#2d2d5e;color:#94a3b8}
  @media(max-width:640px){
    .header-inner{gap:6px}
    h1{font-size:0.95rem}
    .section{padding:10px}
    table{font-size:11px}
    th,td{padding:4px 6px}
  }
</style>

<script>
// ===== 定数 =====
const TIER_LABELS = {1:'1位',10:'10位',50:'50位',100:'100位',500:'500位',1000:'1,000位',2000:'2,000位',100000:'10万位',150000:'15万位',200000:'20万位',270000:'27万位',370000:'37万位'};
const TIER_COLORS = {1:'#fbbf24',10:'#f87171',50:'#60a5fa',100:'#4ade80',500:'#a78bfa',1000:'#fb923c',2000:'#34d399',100000:'#f472b6',150000:'#38bdf8',200000:'#e879f9',270000:'#94a3b8',370000:'#64748b'};
const ALL_TIERS = Object.keys(TIER_LABELS).map(Number);
const GBF_PERIOD_NAMES = ['予選1日目','予選2日目','インターバル','本戦1日目','本戦2日目','本戦3日目','本戦4日目'];

// ===== 状態 =====
let loadedEvents = [];
let currentEventId = null;
let currentEvent = null; // イベントオブジェクト全体
let borderData = [];
let compareEventIds = new Set();  // 比較対象イベントID（複数選択）
let compareDataMap = {};          // { eventId: borderData[] }
let activeTiers = new Set([1, 10, 100, 1000]); // デフォルトは主要4順位帯
let focusTier = null; // フォーカス中のティア（null = 全表示）
let chartType = 'honor';
let chartInstance = null;
let allDays = [];
let autoTimer = null;
let compareSectionCollapsed = false;

// ===== API =====
const API_CACHE_TTL = 60000;
const _apiCache = new Map();

async function apiFetch(url) {
  if (window.__STATIC_MODE__) {
    if (window.__STATIC_CACHE__ && url in window.__STATIC_CACHE__) return window.__STATIC_CACHE__[url];
    return null;
  }
  if (window.__STATIC_CACHE__ && url in window.__STATIC_CACHE__) return window.__STATIC_CACHE__[url];
  const entry = _apiCache.get(url);
  if (entry && Date.now() - entry.ts < API_CACHE_TTL) return entry.data;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    _apiCache.set(url, { data, ts: Date.now() });
    return data;
  } catch { return null; }
}

function numFmt(n) { return n == null ? '-' : n.toLocaleString('ja-JP'); }

function honorFmt(v) {
  if (v == null) return '-';
  const a = Math.abs(v);
  if (a >= 1e8) return (v/1e8).toFixed(a >= 1e9 ? 1 : 2) + '億';
  if (a >= 1e4) return (v/1e4).toFixed(0) + '万';
  return numFmt(v);
}

// GBF日付（0:00〜0:02は前日扱い）
function getGBFDay(capturedAt) {
  const dt = capturedAt.substring(0, 10);
  const hh = parseInt(capturedAt.substring(11, 13));
  const mm = parseInt(capturedAt.substring(14, 16));
  if (hh === 0 && mm <= 2) {
    const [y, m, d] = dt.split('-').map(Number);
    const prev = new Date(y, m - 1, d - 1);
    return prev.toLocaleDateString('sv-SE');
  }
  return dt;
}

// GBF期間名（予選1日目、本戦2日目 etc）
function getGBFPeriodName(capturedAt, eventStartDate) {
  if (!eventStartDate) return capturedAt.substring(0, 10);
  const dt = capturedAt.substring(0, 10);
  const hh = parseInt(capturedAt.substring(11, 13));

  function dateToSerialDay(ymd) {
    const [y, m, d] = ymd.split('-').map(Number);
    return Math.floor(new Date(y, m - 1, d).getTime() / 86400000);
  }

  let snapSerial = dateToSerialDay(dt);
  if (hh < 7) snapSerial -= 1;

  const startSerial = dateToSerialDay(eventStartDate);
  const dayIdx = snapSerial - startSerial;

  return dayIdx < 0 ? '開始前'
    : dayIdx < GBF_PERIOD_NAMES.length ? GBF_PERIOD_NAMES[dayIdx]
    : `${dayIdx + 1}日目`;
}

// イベント終了判定
function isEventEnded(event) {
  if (!event) return true;
  if (event.active) return false;
  if (!event.end_date) return true;
  // end_date + 1日（本戦4日目 24:00 = 翌日 0:00）を過ぎたら終了
  const endMs = new Date(event.end_date + 'T07:00:00+09:00').getTime() + 86400000;
  return Date.now() > endMs;
}

// 本戦4日目を過ぎたか判定（予測不要判定）
function isPredictionNeeded(event) {
  if (!event) return false;
  if (isEventEnded(event)) return false;
  if (!event.start_date) return false;
  // 本戦4日目 = start_date + 6日目（index 6）
  // 本戦4日目の24:00を過ぎたら不要
  const startMs = new Date(event.start_date + 'T00:00:00+09:00').getTime();
  const honsen4EndMs = startMs + 7 * 86400000 + 7 * 3600000; // start + 7日 + 7時間
  return Date.now() < honsen4EndMs;
}

// 相対キー生成（イベント開始日からの日数 + 時刻）
// 比較イベント間の位置合わせに使用
function getRelativeKey(capturedAt, eventStartDate) {
  if (!eventStartDate) return null;
  const dt = capturedAt.substring(0, 10);
  const time = capturedAt.substring(11, 16); // HH:MM
  const hh = parseInt(capturedAt.substring(11, 13));

  function dateToSerialDay(ymd) {
    const [y, m, d] = ymd.split('-').map(Number);
    return Math.floor(new Date(y, m - 1, d).getTime() / 86400000);
  }

  let snapSerial = dateToSerialDay(dt);
  if (hh < 7) snapSerial -= 1;

  const startSerial = dateToSerialDay(eventStartDate);
  const dayIdx = snapSerial - startSerial;
  return `d${dayIdx}_${time}`;
}

function getStaticPageEventId() {
  if (!window.__STATIC_MODE__) return null;
  const h = location.hostname;
  const m = h.match(/^ev(\d+)\./);
  if (m) {
    const code = m[1];
    const ev = loadedEvents.find(e => {
      const ec = (e.event_code || '').replace(/\D/g, '');
      return ec === code;
    });
    if (ev) return ev.id;
  }
  return null;
}

// ===== 初期化 =====
async function init() {
  loadedEvents = await apiFetch('/api/ranking/events') || [];

  // ドロップダウン: 新しい順（API は event_code DESC で返す）
  const sel = document.getElementById('event-select');
  sel.innerHTML = '<option value="">イベント選択</option>';
  loadedEvents.forEach(e => {
    sel.innerHTML += `<option value="${e.id}">${e.name}</option>`;
  });

  // 静的モード: URLからイベント判定
  const pageEventId = getStaticPageEventId();
  const defaultEvent = pageEventId
    ? loadedEvents.find(e => e.id === pageEventId)
    : loadedEvents.find(e => e.active) || loadedEvents[0];

  if (defaultEvent) {
    sel.value = defaultEvent.id;
    currentEventId = defaultEvent.id;
    currentEvent = defaultEvent;
    await loadBorders(currentEventId);
  }

  // バックリンク調整
  if (window.__BORDER_SITE__) {
    // border.gbfranking.com では非表示
    const bl = document.getElementById('back-link');
    if (bl) bl.style.display = 'none';
  } else if (window.__STATIC_MODE__ && window.__STATIC_INDEX_URL__) {
    // ev*.gbfranking.com/border.html ではトップページへ
    document.getElementById('back-link').href = window.__STATIC_INDEX_URL__;
  }

  renderTierToggles();
  renderCompareToggles();
  startAutoRefresh();
}

// ===== データ読み込み =====
async function loadBorders(eventId) {
  borderData = await apiFetch(`/api/ranking/borders?event_id=${eventId}`) || [];
  populateDaySelects();
  renderTable();
  renderChart();
}

async function onEventChange() {
  currentEventId = document.getElementById('event-select').value;
  currentEvent = loadedEvents.find(e => e.id == currentEventId) || null;
  // 比較対象から現在のイベントを除外
  compareEventIds.delete(Number(currentEventId));
  delete compareDataMap[Number(currentEventId)];
  renderCompareToggles();
  if (!currentEventId) { borderData = []; renderTable(); renderChart(); startAutoRefresh(); return; }

  // 静的モード: ページ遷移
  if (window.__STATIC_MODE__ && window.__STATIC_EVENT_URLS__) {
    const pageEventId = getStaticPageEventId();
    if (pageEventId && Number(currentEventId) !== pageEventId) {
      const targetUrl = window.__STATIC_EVENT_URLS__[currentEventId];
      if (targetUrl) {
        const borderUrl = targetUrl.replace(/\/?$/, '/border.html');
        window.location.href = borderUrl;
        return;
      }
    }
  }

  await loadBorders(currentEventId);
  startAutoRefresh();
}

// ===== 比較イベント（複数選択トグル） =====
const COMPARE_COLORS = ['#f472b6','#38bdf8','#a3e635','#fb923c','#c084fc','#22d3ee','#fbbf24','#94a3b8'];

function renderCompareToggles() {
  const wrap = document.getElementById('compare-toggles');
  const countEl = document.getElementById('compare-active-count');
  const others = loadedEvents.filter(e => e.id != currentEventId);
  if (!others.length) { wrap.innerHTML = '<span style="font-size:11px;color:#4a5568">他の古戦場がありません</span>'; return; }
  wrap.innerHTML = others.map(e => {
    const active = compareEventIds.has(e.id);
    // モバイルは短縮名（年を省略: "2025年11月 風古戦場" → "11月 風古戦場"）
    const isMobile = window.innerWidth < 640;
    const displayName = isMobile ? e.name.replace(/^\d{4}年/, '') : e.name;
    return `<button class="cmp-btn ${active ? 'active' : ''}" onclick="toggleCompareEvent(${e.id})">${displayName}</button>`;
  }).join('');
  // アクティブ比較数を表示
  if (countEl) countEl.textContent = compareEventIds.size > 0 ? `(${compareEventIds.size}件選択中)` : '';
  // 折りたたみ状態を反映
  const content = document.getElementById('compare-content');
  if (content) content.style.maxHeight = compareSectionCollapsed ? '0' : '500px';
}

async function toggleCompareEvent(eventId) {
  if (compareEventIds.has(eventId)) {
    compareEventIds.delete(eventId);
    delete compareDataMap[eventId];
  } else {
    compareEventIds.add(eventId);
    // データ取得
    compareDataMap[eventId] = await apiFetch(`/api/ranking/borders?event_id=${eventId}`) || [];
  }
  renderCompareToggles();
  renderChart();
}

// ===== ティアクイックボタン =====
function setDefaultTiers() {
  focusTier = null;
  activeTiers = new Set([1, 10, 100, 1000]);
  renderTierToggles(); renderChart();
}
function setAllTiersOn() {
  focusTier = null;
  activeTiers = new Set(ALL_TIERS);
  renderTierToggles(); renderChart();
}
function setAllTiersOff() {

// ===== 比較セクション折りたたみ =====
function toggleCompareSection() {
  compareSectionCollapsed = !compareSectionCollapsed;
  const btn = document.getElementById('compare-toggle-btn');
  const content = document.getElementById('compare-content');
  const label = document.getElementById('compare-toggle-label');
  if (compareSectionCollapsed) {
    btn.classList.add('collapsed');
    content.style.maxHeight = '0';
    label.textContent = '展開';
  } else {
    btn.classList.remove('collapsed');
    content.style.maxHeight = '500px';
    label.textContent = '折りたたむ';
  }
}

// ===== 日付選択（始期〜終期） =====
function populateDaySelects() {
  allDays = [...new Set(borderData.map(r => getGBFDay(r.captured_at)))].sort();
  const fromSel = document.getElementById('day-from');
  const toSel = document.getElementById('day-to');
  fromSel.innerHTML = '';
  toSel.innerHTML = '';
  const startDate = currentEvent?.start_date || null;
  const isMobile = window.innerWidth < 640;
  allDays.forEach((d) => {
    const periodName = startDate ? getGBFPeriodName(d + ' 12:00:00', startDate) : d;
    // モバイルは短縮形式（例: 6/24）、PCは「本戦2日目（2025-06-24）」
    const label = isMobile
      ? `${d.substring(5).replace('-', '/')}`
      : `${periodName}（${d}）`;
    fromSel.innerHTML += `<option value="${d}">${label}</option>`;
    toSel.innerHTML += `<option value="${d}">${label}</option>`;
  });
  if (allDays.length) {
    fromSel.value = allDays[0];
    toSel.value = allDays[allDays.length - 1];
  }
}

// ===== フィルタ済みデータ =====
function getFilteredData(data) {
  const from = document.getElementById('day-from')?.value || '';
  const to = document.getElementById('day-to')?.value || '';
  if (!from && !to) return data;
  return data.filter(r => {
    const d = getGBFDay(r.captured_at);
    if (from && d < from) return false;
    if (to && d > to) return false;
    return true;
  });
}

// ===== データ処理 =====
function groupByTier(data) {
  const groups = {};
  for (const row of data) {
    if (!groups[row.rank_tier]) groups[row.rank_tier] = [];
    groups[row.rank_tier].push(row);
  }
  for (const tier in groups) {
    groups[tier].sort((a, b) => a.captured_at.localeCompare(b.captured_at));
  }
  return groups;
}

// ===== 予測（0〜7時の停止を考慮） =====
function computePrediction(tierData) {
  if (tierData.length < 3) return null;
  // 活動時間帯（7:00〜24:00）のデータのみで速度算出
  const activeData = tierData.filter(r => {
    const hh = parseInt(r.captured_at.substring(11, 13));
    return hh >= 7; // 7時以降のデータのみ
  });
  if (activeData.length < 3) return null;

  const speeds = [];
  for (let i = 1; i < activeData.length; i++) {
    const diff = activeData[i].honor - activeData[i - 1].honor;
    if (diff >= 0) speeds.push(diff); // 負の差分は除外
  }
  if (!speeds.length) return null;

  // 直近の平均速度（活動時間帯のみ）
  const recent = speeds.slice(-18); // 直近18回（6時間分）
  const avgSpeed = recent.reduce((a, b) => a + b, 0) / recent.length;

  // 残り活動スナップ数: 1日17時間（7:00〜24:00） = 51スナップ（20分×51=17h）
  const ACTIVE_SNAPS_PER_DAY = 51;
  const lastHonor = tierData[tierData.length - 1].honor;
  const predicted = lastHonor + Math.round(avgSpeed * ACTIVE_SNAPS_PER_DAY);
  return { predicted, avgSpeed: Math.round(avgSpeed) };
}

// ===== テーブル描画 =====
function renderTable() {
  const wrap = document.getElementById('border-table-wrap');
  if (!borderData.length) { wrap.innerHTML = '<div class="loading">データなし</div>'; return; }

  const groups = groupByTier(borderData);
  const showPred = isPredictionNeeded(currentEvent);
  let html = '<table><thead><tr><th>順位</th><th>現在貢献度</th><th>20分増加</th>';
  if (showPred) html += '<th>予測(1日後)</th>';
  html += '</tr></thead><tbody>';

  for (const tier of ALL_TIERS) {
    const data = groups[tier];
    if (!data || !data.length) continue;
    const latest = data[data.length - 1];
    const prev = data.length >= 2 ? data[data.length - 2] : null;
    const diff = prev ? latest.honor - prev.honor : null;
    const pred = showPred ? computePrediction(data) : null;

    html += `<tr>
      <td style="color:${TIER_COLORS[tier]}">${TIER_LABELS[tier]}</td>
      <td>${numFmt(latest.honor)}</td>
      <td class="${diff > 0 ? 'positive' : ''}">${diff != null ? '+' + numFmt(diff) : '-'}</td>`;
    if (showPred) html += `<td class="pred-col">${pred ? numFmt(pred.predicted) : '-'}</td>`;
    html += '</tr>';
  }

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ===== ティア切替 =====
function renderTierToggles() {
  const wrap = document.getElementById('tier-toggles');
  wrap.innerHTML = ALL_TIERS.map(tier => {
    const active = activeTiers.has(tier);
    const focused = focusTier === tier;
    const color = TIER_COLORS[tier];
    const cls = focused ? 'active' : active ? 'active' : 'inactive';
    const bg = focused ? color + '44' : active ? color + '22' : 'transparent';
    const border = focused ? `2px solid ${color}` : `1px solid ${color}`;
    return `<button class="tier-btn ${cls}"
      style="color:${color};border:${border};background:${bg}"
      onclick="toggleTier(${tier})" ondblclick="focusTierToggle(${tier})"
      title="クリック: 表示切替 / ダブルクリック: フォーカス">${TIER_LABELS[tier]}</button>`;
  }).join('');
}

function toggleTier(tier) {
  focusTier = null; // フォーカス解除
  if (activeTiers.has(tier)) activeTiers.delete(tier);
  else activeTiers.add(tier);
  renderTierToggles();
  renderChart();
}

function focusTierToggle(tier) {
  if (focusTier === tier) {
    // フォーカス解除 → 全ティア復帰
    focusTier = null;
    activeTiers = new Set([1, 10, 100, 1000]);
  } else {
    // このティアだけにフォーカス
    focusTier = tier;
    activeTiers = new Set([tier]);
  }
  renderTierToggles();
  renderChart();
}

// ===== チャートタイプ =====
function setChartType(type) {
  chartType = type;
  document.querySelectorAll('.gchart-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`ct-${type}`).classList.add('active');
  renderChart();
}

// ===== グラフ描画 =====
function renderChart() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const filtered = getFilteredData(borderData);
  if (!filtered.length) return;

  const isMobile = window.innerWidth < 640;
  const canvas = document.getElementById('border-chart');
  const groups = groupByTier(filtered);

  // 全タイムスタンプを収集
  const allTimes = new Set();
  for (const tier of ALL_TIERS) {
    if (!activeTiers.has(tier)) continue;
    (groups[tier] || []).forEach(r => allTimes.add(r.captured_at));
  }
  const labels = [...allTimes].sort();
  if (!labels.length) return;

  // 時刻ラベル短縮
  const shortLabels = labels.map(t => {
    const d = new Date(t.replace(' ', 'T'));
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  });

  const datasets = [];
  const isSpeed = chartType === 'speed';
  const predInfo = [];
  const showPred = !isSpeed && isPredictionNeeded(currentEvent);

  for (const tier of ALL_TIERS) {
    if (!activeTiers.has(tier)) continue;
    const data = groups[tier] || [];
    if (!data.length) continue;

    const timeMap = {};
    data.forEach(r => { timeMap[r.captured_at] = r.honor; });

    let values;
    if (isSpeed) {
      const sorted = [...data].sort((a, b) => a.captured_at.localeCompare(b.captured_at));
      const speedMap = {};
      for (let i = 1; i < sorted.length; i++) {
        speedMap[sorted[i].captured_at] = sorted[i].honor - sorted[i - 1].honor;
      }
      values = labels.map(t => speedMap[t] ?? null);
    } else {
      values = labels.map(t => timeMap[t] ?? null);
    }

    if (!isSpeed) {
      // 累計貢献度は下がらないはず → 下がる区間は点線で表示
      // さらに、下がった値を直前の最大値でクリップ（グラフ上で下がらない）
      let maxSoFar = null;
      const clippedValues = values.map(v => {
        if (v == null) return null;
        if (maxSoFar == null || v >= maxSoFar) { maxSoFar = v; return v; }
        return maxSoFar; // 下がった場合は直前最大値を維持
      });
      const segmentCallback = (ctx) => {
        // 元データで下がっていた区間を検出（クリップ前の値で判定）
        const i0 = ctx.p0DataIndex, i1 = ctx.p1DataIndex;
        if (values[i0] != null && values[i1] != null && values[i1] < values[i0]) {
          return [4, 4]; // 点線
        }
        return undefined;
      };
      datasets.push({
        label: TIER_LABELS[tier],
        data: clippedValues,
        borderColor: TIER_COLORS[tier],
        backgroundColor: TIER_COLORS[tier] + '15',
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.3,
        spanGaps: true,
        segment: { borderDash: segmentCallback },
        _rawValues: values, // 元データ保持（ツールチップ用）
      });
    } else {
      datasets.push({
        label: TIER_LABELS[tier],
        data: values,
        borderColor: TIER_COLORS[tier],
        backgroundColor: TIER_COLORS[tier] + '15',
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.3,
        spanGaps: false,
      });
    }

    // 予測線（貢献度推移 & 開催中のみ & PCのみ）
    if (showPred) {
      const fullData = groupByTier(borderData)[tier] || [];
      const pred = computePrediction(fullData);
      if (pred) {
        // 予測値は最後のデータ以上であること（下がらない）
        const lastHonor = data[data.length - 1].honor;
        const predValue = Math.max(pred.predicted, lastHonor);
        predInfo.push(`${TIER_LABELS[tier]}: ${numFmt(predValue)}（+${numFmt(pred.avgSpeed)}/20分）`);

        const lastTime = data[data.length - 1].captured_at;
        const lastIdx = labels.indexOf(lastTime);
        if (lastIdx >= 0) {
          const predValues = new Array(labels.length).fill(null);
          predValues[lastIdx] = lastHonor;
          predValues.push(predValue);
          datasets.push({
            label: `${TIER_LABELS[tier]}(予測)`,
            data: predValues,
            borderColor: TIER_COLORS[tier],
            backgroundColor: 'transparent',
            pointRadius: [0, 3],
            borderWidth: 1.5,
            borderDash: [6, 4],
            tension: 0,
            spanGaps: true,
          });
        }
      }
    }
  }

  // 比較イベントデータ（複数対応、期間名ベースで位置合わせ）
  const CMP_DASHES = [[6,3],[2,4],[10,5],[4,8],[8,2,2,2]];
  let cmpIdx = 0;

  // メインイベントの相対キー→ラベルインデックスマップ
  const mainStartDate = currentEvent?.start_date;
  const relKeyToIdx = {};
  if (mainStartDate) {
    labels.forEach((t, i) => {
      const rk = getRelativeKey(t, mainStartDate);
      if (rk) relKeyToIdx[rk] = i;
    });
  }

  for (const cmpEventId of compareEventIds) {
    const cmpAllData = compareDataMap[cmpEventId];
    if (!cmpAllData || !cmpAllData.length) continue;
    const cmpEvent = loadedEvents.find(e => e.id === cmpEventId);
    const cmpName = cmpEvent ? cmpEvent.name : `ID:${cmpEventId}`;
    const cmpStartDate = cmpEvent?.start_date;
    const dashPattern = CMP_DASHES[cmpIdx % CMP_DASHES.length];
    cmpIdx++;

    const cmpGroups = groupByTier(cmpAllData);

    for (const tier of ALL_TIERS) {
      if (!activeTiers.has(tier)) continue;
      const cmpTierData = cmpGroups[tier] || [];
      if (!cmpTierData.length) continue;

      const sorted = [...cmpTierData].sort((a, b) => a.captured_at.localeCompare(b.captured_at));
      const values = new Array(labels.length).fill(null);

      if (mainStartDate && cmpStartDate) {
        // 期間名ベースでマッピング（予選1日目同士、本戦2日目同士を合わせる）
        const prevHonor = {};
        for (const row of sorted) {
          const rk = getRelativeKey(row.captured_at, cmpStartDate);
          if (!rk) continue;
          const idx = relKeyToIdx[rk];
          if (idx == null) continue;
          if (isSpeed) {
            const pKey = `${tier}_prev`;
            if (prevHonor[pKey] != null) values[idx] = row.honor - prevHonor[pKey];
            prevHonor[pKey] = row.honor;
          } else {
            values[idx] = row.honor;
          }
        }
      } else {
        // start_date が不明な場合はインデックス順フォールバック
        if (isSpeed) {
          for (let i = 1; i < sorted.length && i < labels.length; i++) {
            values[i] = sorted[i].honor - sorted[i - 1].honor;
          }
        } else {
          for (let i = 0; i < Math.min(sorted.length, labels.length); i++) {
            values[i] = sorted[i].honor;
          }
        }
      }

      // ティア固有色を使い、破線パターンで比較イベントを区別
      const tierColor = TIER_COLORS[tier];

      // 比較データも累計貢献度は下がらないようクリップ
      let finalValues = values;
      if (!isSpeed) {
        let cmpMax = null;
        finalValues = values.map(v => {
          if (v == null) return null;
          if (cmpMax == null || v >= cmpMax) { cmpMax = v; return v; }
          return cmpMax;
        });
      }

      datasets.push({
        label: `${TIER_LABELS[tier]}(${cmpName})`,
        data: finalValues,
        borderColor: tierColor + 'aa',
        backgroundColor: 'transparent',
        pointRadius: 0,
        borderWidth: 1.5,
        borderDash: dashPattern,
        tension: 0.3,
        spanGaps: !isSpeed,
      });
    }
  }

  // 予測ラベル追加（予測線がある場合、最後にラベルを1つ追加）
  if (showPred && predInfo.length) {
    shortLabels.push(isMobile ? '予測' : '予測(1日後)');
    // 予測線を持たない通常データセットにnullを追加
    for (const ds of datasets) {
      if (!ds.label?.includes('(予測)') && ds.data.length === labels.length) {
        ds.data.push(null);
      }
    }
  }

  // 予測情報表示
  const predEl = document.getElementById('predict-info');
  predEl.textContent = predInfo.length ? '予測(1日後): ' + predInfo.join(' / ') : '';

  // canvas サイズ
  const areaEl = document.getElementById('chart-area');
  const canvasW = areaEl ? areaEl.clientWidth : 800;
  canvas.width = canvasW;
  canvas.height = Math.min(350, Math.round(canvasW * 0.45));

  // モバイル時に線を細く
  if (isMobile) {
    datasets.forEach(ds => { if (!ds.label?.includes('(比較)')) ds.borderWidth = 1.5; });
  }

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels: shortLabels, datasets },
    options: {
      responsive: false,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e3f',
          titleColor: '#e2e8f0',
          bodyColor: '#e2e8f0',
          borderColor: '#2d2d5e',
          borderWidth: 1,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${numFmt(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 9 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 20 },
          grid: { color: '#1a1a2e' },
        },
        y: {
          ticks: {
            color: '#64748b',
            font: { size: 10 },
            callback: v => honorFmt(v),
          },
          grid: { color: '#1a1a2e' },
        },
      },
    },
  });

  // カスタム凡例（イベントごとにグループ改行）
  renderCustomLegend(datasets);

  // タッチ: キャンバス外タップでツールチップを消す（一度だけ登録）
  if (!window._borderTooltipDismiss) {
    window._borderTooltipDismiss = (e) => {
      if (!canvas.contains(e.target) && chartInstance) {
        chartInstance.tooltip.setActiveElements([], { x: 0, y: 0 });
        chartInstance.update('none');
      }
    };
    document.addEventListener('touchstart', window._borderTooltipDismiss, { passive: true });
    document.addEventListener('click', window._borderTooltipDismiss);
  }
}

function renderCustomLegend(datasets) {
  const wrap = document.getElementById('chart-legend');
  const mainItems = [];
  const predItems = [];
  const cmpGroups = {}; // { eventName: items[] }

  datasets.forEach((ds, idx) => {
    const label = ds.label || '';
    if (label.includes('(予測)')) {
      // 予測ラベルからティア名だけ取り出す: "1位(予測)" → "1位"
      const shortLabel = label.replace('(予測)', '').trim();
      predItems.push({ idx, ds, label: shortLabel });
    } else {
      const m = label.match(/^(.+?)\((.+)\)$/);
      if (m) {
        const tierLabel = m[1];
        const evName = m[2];
        if (!cmpGroups[evName]) cmpGroups[evName] = [];
        cmpGroups[evName].push({ idx, ds, label: tierLabel });
      } else {
        mainItems.push({ idx, ds, label });
      }
    }
  });

  let html = '';

  const mainName = currentEvent ? currentEvent.name : '現在のイベント';
  html += buildLegendGroup(mainName, mainItems);

  if (predItems.length) {
    html += buildLegendGroup('予測', predItems);
  }

  for (const [evName, items] of Object.entries(cmpGroups)) {
    html += buildLegendGroup(evName, items);
  }

  wrap.innerHTML = html;
}

function makeSvgLine(color, dashArray, width) {
  // SVGで実際の破線パターンを描画
  const w = 24, h = 6;
  const strokeW = width || 2;
  const dashAttr = dashArray ? ` stroke-dasharray="${dashArray.join(',')}"` : '';
  return `<svg class="legend-swatch" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="${color}" stroke-width="${strokeW}"${dashAttr}/></svg>`;
}

function buildLegendGroup(title, items) {
  if (!items.length) return '';
  let html = `<div class="legend-group"><div class="legend-group-title">${title}</div><div class="legend-items">`;
  for (const item of items) {
    const ds = item.ds;
    const color = ds.borderColor || '#94a3b8';
    const dash = ds.borderDash || null;
    const hidden = chartInstance && !chartInstance.isDatasetVisible(item.idx);
    html += `<span class="legend-item ${hidden ? 'hidden' : ''}" onclick="toggleLegendDataset(${item.idx})">`;
    html += makeSvgLine(color, dash, ds.borderWidth || 2);
    html += `${item.label}</span>`;
  }
  html += '</div></div>';
  return html;
}

function toggleLegendDataset(idx) {
  if (!chartInstance) return;
  const visible = chartInstance.isDatasetVisible(idx);
  chartInstance.setDatasetVisibility(idx, !visible);
  chartInstance.update();
  renderCustomLegend(chartInstance.data.datasets);
}

// ===== 自動更新（開催中イベントのみ） =====
function startAutoRefresh() {
  if (autoTimer) clearInterval(autoTimer);
  if (window.__STATIC_MODE__) return;
  if (!currentEvent || !currentEvent.active) return;
  autoTimer = setInterval(async () => {
    _apiCache.clear(); // キャッシュクリア
    if (currentEventId) {
      borderData = await apiFetch(`/api/ranking/borders?event_id=${currentEventId}`) || [];
      renderTable();
      renderChart();
    }
  }, 5 * 60 * 1000); // 5分ごと
}

// ===== 起動 =====
init();
</script>
